<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>WhatsApp Simulator · Campus Meridian Agent</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        --wa-bg: #e5ddd5;
        --wa-panel: #ece5dd;
        --wa-green: #075e54;
        --wa-tint: #25d366;
        --wa-bubble-in: white;
        --wa-bubble-out: #d9fdd3;
        --navy-900: #0a1733;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, sans-serif;
        background: #efeae2;
        color: var(--navy-900);
      }
      .page { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; background: var(--wa-bg); box-shadow: 0 0 60px rgba(0,0,0,0.08); }
      .topback {
        background: white; padding: 10px 14px; border-bottom: 1px solid #ddd;
        font-size: 13px; display: flex; justify-content: space-between; align-items: center;
      }
      .topback a { color: #075e54; text-decoration: none; font-weight: 500; }
      .topback .info { color: #5b6478; font-size: 12px; }
      .header {
        background: var(--wa-green); color: white; padding: 14px 16px;
        display: flex; align-items: center; gap: 14px;
      }
      .header .avatar {
        width: 40px; height: 40px; border-radius: 999px;
        background: linear-gradient(135deg, #ecc266, #d8a23e);
        display: grid; place-items: center; color: var(--navy-900);
        font-weight: 700; font-size: 14px;
      }
      .header .name { font-weight: 500; font-size: 15px; }
      .header .stat { font-size: 12px; opacity: 0.7; }
      .messages {
        flex: 1; overflow-y: auto; padding: 16px;
        background: var(--wa-bg);
        background-image: linear-gradient(rgba(0,0,0,0.02) 1px, transparent 1px),
                          linear-gradient(90deg, rgba(0,0,0,0.02) 1px, transparent 1px);
        background-size: 16px 16px;
        display: flex; flex-direction: column; gap: 8px;
      }
      .msg { max-width: 75%; padding: 8px 12px 6px; border-radius: 8px;
        font-size: 14.5px; line-height: 1.4; word-wrap: break-word; position: relative;
        box-shadow: 0 1px 0.5px rgba(0,0,0,0.13); }
      .msg.in { align-self: flex-start; background: var(--wa-bubble-in); border-top-left-radius: 0; }
      .msg.out { align-self: flex-end; background: var(--wa-bubble-out); border-top-right-radius: 0; }
      .msg .time { font-size: 10px; color: rgba(0,0,0,0.45); text-align: right; margin-top: 2px; }
      .typing {
        align-self: flex-start; background: var(--wa-bubble-in); padding: 12px 16px; border-radius: 8px;
        border-top-left-radius: 0; display: inline-flex; gap: 4px;
      }
      .typing span { width: 6px; height: 6px; background: #999; border-radius: 999px; animation: blink 1.4s infinite; }
      .typing span:nth-child(2) { animation-delay: 0.2s; }
      .typing span:nth-child(3) { animation-delay: 0.4s; }
      @keyframes blink { 0%,80%,100% { opacity: 0.3; } 40% { opacity: 1; } }
      .input {
        background: #f0f2f5; padding: 8px 10px; display: flex; gap: 8px; align-items: center;
      }
      .input input { flex: 1; border: 0; padding: 11px 14px; border-radius: 999px;
        background: white; font-size: 15px; outline: none; font-family: inherit; }
      .input button {
        width: 44px; height: 44px; border-radius: 999px; background: var(--wa-tint);
        border: 0; color: white; font-size: 18px; cursor: pointer; display: grid; place-items: center;
      }
      .input button:disabled { opacity: 0.5; cursor: not-allowed; }
      .setup {
        padding: 16px;
        display: flex; flex-direction: column; gap: 12px;
      }
      .setup label { font-size: 12px; color: #555; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; }
      .setup input, .setup select { height: 42px; padding: 0 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
      .setup button {
        background: var(--wa-tint); color: white; border: 0; height: 46px;
        border-radius: 8px; font-weight: 600; font-size: 15px; cursor: pointer; margin-top: 6px;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="topback">
        <a href="/">← Demo home</a>
        <span class="info" id="info">Setup</span>
      </div>

      <div class="header">
        <div class="avatar">CM</div>
        <div>
          <div class="name">Campus Meridian</div>
          <div class="stat" id="presence">offline</div>
        </div>
      </div>

      <!-- Setup -->
      <div class="setup" id="setup">
        <label>Your name</label>
        <input id="leadName" type="text" value="Sneha Iyer" />
        <label>Country enquired</label>
        <select id="leadCountry">
          <option>Canada</option>
          <option>UK</option>
          <option>Ireland</option>
          <option>Australia</option>
          <option>USA</option>
          <option>Germany</option>
        </select>
        <button id="startBtn">Start conversation</button>
      </div>

      <!-- Conversation -->
      <div class="messages" id="messages" style="display:none"></div>
      <div class="input" id="inputBar" style="display:none">
        <input id="msgInput" type="text" placeholder="Type a message" autocomplete="off" />
        <button id="sendBtn" title="Send">➤</button>
      </div>
    </div>

    <script>
      const setupEl = document.getElementById("setup");
      const messagesEl = document.getElementById("messages");
      const inputBar = document.getElementById("inputBar");
      const startBtn = document.getElementById("startBtn");
      const sendBtn = document.getElementById("sendBtn");
      const msgInput = document.getElementById("msgInput");
      const infoEl = document.getElementById("info");
      const presenceEl = document.getElementById("presence");

      let sessionId = null;

      function timeNow() {
        return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", hour12: false });
      }

      function addMessage(dir, text) {
        const div = document.createElement("div");
        div.className = "msg " + dir;
        const body = document.createElement("span");
        body.textContent = text;
        const t = document.createElement("div");
        t.className = "time";
        t.textContent = timeNow();
        div.appendChild(body);
        div.appendChild(t);
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function showTyping() {
        const t = document.createElement("div");
        t.className = "typing";
        t.id = "typing";
        t.innerHTML = "<span></span><span></span><span></span>";
        messagesEl.appendChild(t);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }
      function hideTyping() {
        const t = document.getElementById("typing");
        if (t) t.remove();
      }

      startBtn.addEventListener("click", async () => {
        const leadName = document.getElementById("leadName").value.trim();
        const country = document.getElementById("leadCountry").value;
        if (!leadName) return alert("Enter a name");

        setupEl.style.display = "none";
        messagesEl.style.display = "flex";
        inputBar.style.display = "flex";
        infoEl.textContent = "Live";
        presenceEl.textContent = "online";

        showTyping();
        const res = await fetch("/api/wa/start", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ leadName, country }),
        });
        hideTyping();
        if (!res.ok) {
          addMessage("in", "⚠️ Failed to start conversation. Is the server running?");
          return;
        }
        const data = await res.json();
        sessionId = data.sessionId;
        addMessage("in", data.message);
        msgInput.focus();
      });

      async function sendMessage() {
        const text = msgInput.value.trim();
        if (!text || !sessionId) return;
        addMessage("out", text);
        msgInput.value = "";
        msgInput.disabled = true;
        sendBtn.disabled = true;
        showTyping();

        const res = await fetch("/api/wa/message", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ sessionId, text }),
        });
        hideTyping();
        msgInput.disabled = false;
        sendBtn.disabled = false;
        if (!res.ok) {
          addMessage("in", "⚠️ Failed to send.");
          return;
        }
        const data = await res.json();
        addMessage("in", data.message);
        msgInput.focus();
      }

      sendBtn.addEventListener("click", sendMessage);
      msgInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") sendMessage();
      });
    </script>
  </body>
</html>
